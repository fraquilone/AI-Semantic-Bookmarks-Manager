<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Semantic Bookmarks</title>
    <link rel="stylesheet" href="popup.css">
</head>
<body>
    <div class="header">
        <h2>Semantic Bookmarks</h2>
    </div>
    
    <div class="tabs">
        <button class="tab-btn active" id="tab-save">Save</button>
        <button class="tab-btn" id="tab-search">Search</button>
        <button class="tab-btn" id="tab-manage">Manage</button>
    </div>

    <!-- SAVE SECTION -->
    <div id="section-save" class="section active">
        <div class="input-group">
            <label>Current URL</label>
            <input type="text" id="current-url" readonly />
        </div>
        
        <div class="btn-group">
            <button id="btn-save" class="primary-btn">Generate AI Bookmark</button>
            <button id="btn-regen" class="secondary-btn hidden">🔄 Regenerate</button>
        </div>
        
        <div id="save-status" class="status-message"></div>
        <div id="save-preview" class="results-container"></div>
    </div>

    <!-- SEARCH SECTION -->
    <div id="section-search" class="section">
        <div class="input-group">
            <input type="text" id="search-query" placeholder="E.g., 'coding tutorials' or 'ai tools'" />
        </div>
        <div class="slider-group">
            <label for="threshold-slider">Match Threshold: <span id="threshold-val">0.20</span></label>
            <!-- Updated step to 0.01 -->
            <input type="range" id="threshold-slider" min="-1.0" max="1.0" step="0.01" value="0.20" />
        </div>
        <button id="btn-search" class="primary-btn">Search Semantic DB</button>
        
        <div id="search-status" class="status-message"></div>
        <div id="search-results" class="results-container"></div>
    </div>

    <!-- MANAGE SECTION -->
    <div id="section-manage" class="section">
        <div class="filter-controls">
            <input type="text" id="manage-search" placeholder="Search title, URL, tag, category..." />
            <div class="filter-row">
                <label>Limit: 
                    <input type="number" id="manage-limit" value="10" min="1" max="100" style="width: 50px;" />
                </label>
                <select id="manage-sort">
                    <option value="created_at:desc">Newest First</option>
                    <option value="created_at:asc">Oldest First</option>
                    <option value="title:asc">Title (A-Z)</option>
                </select>
            </div>
        </div>
        
        <div id="manage-status" class="status-message"></div>
        <div id="manage-results" class="results-container"></div>
    </div>

    <script src="popup.js"></script>
</body>
</html>
